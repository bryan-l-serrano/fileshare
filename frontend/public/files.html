<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FileShare - Files</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<h1><a href="/" style="color:inherit;text-decoration:none;">FileShare</a></h1>
<div id="breadcrumb"></div>
<div id="toolbar">
  <input type="text" id="new-folder-name" placeholder="New folder name">
  <button onclick="createFolder()">Create Folder</button>
</div>
<div id="drop-zone" class="upload-zone">
  <p>Drag &amp; drop files here to upload, or click to select</p>
  <input type="file" id="upload-btn" multiple>
</div>
<div id="status"></div>
<div id="loading">Loading...</div>
<div id="content"></div>

<div id="image-modal" class="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal-content">
    <span class="modal-close" onclick="closeModal()">&times;</span>
    <div class="modal-title"></div>
    <img src="" alt="Preview">
  </div>
</div>

<script src="/js/files.js"></script>
</body>
</html>
